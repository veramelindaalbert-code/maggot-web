<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E9F5ED"/>
      <stop offset="100%" stop-color="#D8F3DC"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#sky)" />
  
  <!-- Sun -->
  <circle cx="680" cy="120" r="60" fill="url(#sunGrad)" opacity="0.8"/>
  <circle cx="680" cy="120" r="75" fill="url(#sunGrad)" opacity="0.3"/>
  
  <!-- Hilly landscape -->
  <path d="M-100,600 L-100,450 Q150,300 450,450 T950,400 L950,600 Z" fill="#74C69D" opacity="0.5"/>
  <path d="M-50,600 L-50,480 Q250,380 500,500 T1050,450 L1050,600 Z" fill="#52B788" opacity="0.7"/>
  <path d="M-10,600 L-10,520 Q350,450 650,530 T1100,500 L1100,600 Z" fill="#40916C" opacity="0.9"/>

  <!-- Greenhouse Glass Structure -->
  <g transform="translate(150, 220)">
    <!-- Base foundation -->
    <rect x="50" y="220" width="380" height="60" rx="10" fill="#2D6A4F"/>
    
    <!-- Arch glass pane frames -->
    <path d="M50,220 L50,110 A190,190 0 0,1 430,110 L430,220 Z" fill="rgba(255, 255, 255, 0.45)" stroke="#1B4332" stroke-width="6"/>
    <path d="M145,220 L145,60" stroke="#1B4332" stroke-width="4"/>
    <path d="M240,220 L240,30" stroke="#1B4332" stroke-width="4"/>
    <path d="M335,220 L335,60" stroke="#1B4332" stroke-width="4"/>
    <path d="M50,140 Q240,80 430,140" fill="none" stroke="#1B4332" stroke-width="4"/>
    
    <!-- Entrance door -->
    <rect x="200" y="140" width="80" height="110" rx="5" fill="rgba(216, 243, 220, 0.6)" stroke="#1B4332" stroke-width="4"/>
    <circle cx="215" cy="195" r="5" fill="#1B4332"/>
    
    <!-- Plant silhouettes inside -->
    <path d="M70,220 Q90,170 120,220" fill="none" stroke="#40916C" stroke-width="8" stroke-linecap="round"/>
    <path d="M120,220 Q130,165 150,220" fill="none" stroke="#52B788" stroke-width="8" stroke-linecap="round"/>
    <path d="M360,220 Q370,180 390,220" fill="none" stroke="#2D6A4F" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Big Decorative Eco Leaf -->
  <g transform="translate(620, 420) scale(1.3)">
    <path d="M 0,0 C 40,-40 80,-40 100,0 C 80,40 40,40 0,0 Z" fill="url(#leafGrad)" />
    <path d="M 0,0 L 80,0" stroke="#E9F5ED" stroke-width="2"/>
    <path d="M 20,0 L 35,15" stroke="#E9F5ED" stroke-width="1.5"/>
    <path d="M 40,0 L 55,15" stroke="#E9F5ED" stroke-width="1.5"/>
    <path d="M 20,0 L 35,-15" stroke="#E9F5ED" stroke-width="1.5"/>
    <path d="M 40,0 L 55,-15" stroke="#E9F5ED" stroke-width="1.5"/>
  </g>
</svg>